<!doctype html>
<html lang="en" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#0a0f1c" />
    <meta name="description" content="BatEcho — professional bat acoustic monitoring, echolocation call analysis and species identification for field biologists." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <title>BatEcho — Acoustic Monitoring Platform</title>
    <script>
      // Surface startup failures on screen (no dev console available on mobile).
      (function () {
        function show(label, detail) {
          var el = document.getElementById('startup-error');
          if (!el) return;
          el.style.display = 'block';
          el.textContent = 'BatEcho startup error — ' + label + ': ' + detail;
        }
        window.addEventListener('error', function (e) {
          show(e.filename ? 'script' : 'error', (e.message || 'unknown') + (e.lineno ? ' @' + e.lineno + ':' + e.colno : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          show('promise', (e.reason && (e.reason.message || e.reason)) + '');
        });
      })();
    </script>
  </head>
  <body>
    <div id="app" aria-busy="true">
      <div class="boot-screen">
        <div class="boot-logo">
          <svg viewBox="0 0 64 64" width="72" height="72" aria-hidden="true">
            <path fill="currentColor" d="M32 18c-3-7-9-10-15-9 3 2 4 5 4 8-4-2-9-1-12 2 5 0 8 3 10 6 3 4 8 7 13 7s10-3 13-7c2-3 5-6 10-6-3-3-8-4-12-2 0-3 1-6 4-8-6-1-12 2-15 9z"/>
          </svg>
        </div>
        <div class="boot-title">BatEcho</div>
        <div class="boot-sub">Initializing acoustic engine…</div>
      </div>
      <div id="startup-error" style="display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:1000;background:#3b0d0d;color:#fecaca;border:1px solid #ef4444;border-radius:10px;padding:12px 14px;font:13px/1.4 -apple-system,system-ui,sans-serif;word-break:break-word"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
